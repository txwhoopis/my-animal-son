<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crie sua Conta</title>
    <link rel="stylesheet" href="criarconta.css">
    <link rel="icon" href="../logotipo.png">

</head>
<body>
    <div class="form">
        <a href="javascript:history.back();" class="voltar"><span class="icon">&rsaquo;</span> Voltar</a>

        <div class="logo">
        <img src="../logotipo.png" id="logo"><h2>My Animal Son</h2>
        </div>

        <h1>Criar sua conta</h1>
        <p>Gratuito e sem complicação</p>

        <form action="#" method="post" id="formCadastro">
            <div>
                <label for="nome">Nome completo</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome" required>
                <span class="erro" id="erroNome"></span>
            </div>
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                <span class="erro" id="erroEmail"></span>
            </div>
            <div>
                <label for="tel">Telefone(opcional)</label>
                <input type="tel" id="tel" name="telefone" placeholder="(xx)xxxx-xxxx">
            </div>
            <div>
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" minlength="6" placeholder="Mínimo 6 caracteres" required>
                <span class="erro" id="erroSenha"></span>
                <span id="forcaSenha"></span>

            </div>
            <div>
                <button type="submit" id="btnCriar">Criar conta</button>
            </div>
            <div class="linkentrar">
            <p>Ja tem conta? <a href="../login/login.html">Entrar</a></p>
            </div>
        </form>
    
    <footer id="rodape">
        <div class="container">
            <p>© 2026 My Animal Son. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script>

        const campoSenha = document.getElementById('senha');

        campoSenha.addEventListener('input', function() {
            const senha = this.value;
            const forca = document.getElementById('forcaSenha');

            let pontos = 0;

            if (senha.length >= 8) pontos++;
            if (/[A-Z]/.test(senha)) pontos++;
            if (/[a-z]/.test(senha)) pontos++;
            if (/[0-9]/.test(senha)) pontos++;
            if (/[^A-Za-z0-9]/.test(senha)) pontos++;

            if (senha.length === 0) {
                forca.textContent = '';
            } else if (pontos <= 2) {
                forca.textContent = 'Senha fraca';
                forca.style.color = 'red';
            } else if (pontos <= 4) {
                forca.textContent = 'Senha média';
                forca.style.color = 'orange';
            } else {
                forca.textContent = 'Senha forte';
                forca.style.color = 'green';
            }
        });

        document.getElementById('formCadastro').addEventListener('submit', function(e){
            e.preventDefault();

            var nome = document.getElementById('nome').value.trim();
            var email = document.getElementById('email').value.trim().toLowerCase();
            var senha = document.getElementById('senha').value;
            var ok = true;

            ['erroNome', 'erroEmail', 'erroSenha'].forEach(function(id){
                document.getElementById(id).textContent = '';
            });

            if (nome.length < 2) {
                document.getElementById('erroNome').textContent = 'Nome deve ter pelo menos 2 caracteres';
                ok = false;
            }

            if (!email || !email.includes('@')){
                document.getElementById('erroEmail').textContent = 'Email inválido';
                ok = false;
            }

            const senhaForte =
                senha.length >= 8 &&
                /[A-Z]/.test(senha) &&
                /[a-z]/.test(senha) &&
                /[0-9]/.test(senha) &&
                /[^A-Za-z0-9]/.test(senha);

            if (!senhaForte) {
                document.getElementById('erroSenha').textContent =
                    'A senha precisa ter 8 caracteres, maiúscula, minúscula, número e símbolo.';
                ok = false;
            }

            if (ok){
                let usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];

                const emailExiste = usuarios.some(usuario => usuario.email === email);

                if (emailExiste){
                    document.getElementById('erroEmail').textContent = 'Este email já está cadastrado!';
                    return;
                }

                const novoUsuario = {
                    nome: nome,
                    email: email,
                    senha: senha
                };

                usuarios.push(novoUsuario);

                localStorage.setItem('usuarios', JSON.stringify(usuarios));
                localStorage.setItem('usuarioLogado', JSON.stringify(novoUsuario));

                var btn = document.getElementById('btnCriar');
                btn.disabled = true;
                btn.textContent = 'Criando conta...';

                setTimeout(function(){
                    window.location.href = '../perfil/perfil.html';
                }, 800);
            }
        });

    </script>
</body>
</html>
