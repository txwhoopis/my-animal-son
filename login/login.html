<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="icon" href="../logotipo.png">

</head>
<body>
    <div class="form">
        <a href="javascript:history.back();" class="voltar"><span class="icon">&rsaquo;</span> Voltar</a>
        <div class="logo">
        <img src="../logotipo.png" id="logo"><h2>My Animal Son</h2>
        </div>

        <h1>Bem-vindo de volta</h1>
        <p>Entre para acessar o perfil do seu pet</p>

        <form action="#" method="post" id="formLogin">
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                <span class="erro" id="erroEmail"></span>
            </div>
            <div>
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" min="6" placeholder="Mínimo 6 caracteres" required>
                <span class="erro" id="erroSenha"></span>
            </div>
            <div>
                <button type="submit" id="btnEntrar">Entrar</button>
            </div>
            <div class="link">
            <p>Não tem conta? <a href="../criar sua conta/criarconta.html">Criar conta gratuita</a></p>
            </div>
        </form>
    
    <footer id="rodape">
        <div class="container">
            <p>© 2026 My Animal Son. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script>

        document.getElementById('formLogin').addEventListener('submit', function(e){
            e.preventDefault();

            var email = document.getElementById('email').value.trim().toLowerCase();
            var senha = document.getElementById('senha').value;
            var ok = true;

            document.getElementById('erroEmail').textContent = '';
            document.getElementById('erroSenha').textContent = '';

            if(!email || !email.includes('@')){
                document.getElementById('erroEmail').textContent = 'Email inválido';
                ok = false;
            }

            if (!senha) {
                document.getElementById('erroSenha').textContent = 'Senha Obrigatória';
                ok = false;         
            }

            if (ok){

                let usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];

                let usuarioEncontrado = usuarios.find(function(usuario){
                    return usuario.email === email && usuario.senha === senha;
                });

                if (!usuarioEncontrado) {
                    document.getElementById('erroSenha').textContent = 'Email ou senha incorretos';
                    return;
                }

                localStorage.setItem('usuarioLogado', JSON.stringify(usuarioEncontrado));


                var btn = document.getElementById('btnEntrar');
                btn.disabled = true;
                btn.textContent = 'Entrando...';
            

                setTimeout(function(){
                window.location.href = '../perfil/perfil.html'; }, 800);
            }
        });

    </script>
            
</body>
</html>
