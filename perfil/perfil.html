    <!--Modal- Adicionar novo pet-->

    <div id="modal-overplay" style="display: none;">
        <div id="modal-box">
            <h2>Adicionar novo pet</h2>

            <form id="formnovopet" onsubmit="adicionarPet(event)">
                <label for="petnome">Nome</label>
                <input type="text" id="petnome" placeholder="Nome do pet" required>

                <label for="petEspecie">Espécie</label>
                <select id="petEspecie" required>
                    <option value="cachorro">Cachorro</option>
                    <option value="gato">Gato</option>
                    <option value="passaro">Pássaro</option>
                    <option value="coelho">Coelho</option>
                    <option value="outro">Outro</option>
                </select>

                <div class="linha-dupla">
                    <div>
                        <label for="petRaca">Raça</label>
                        <input type="text" id="petRaca" placeholder="Opcional">
            
                    </div>
                    <div>
                        <label for="petIdade">Idade (anos)</label>
                        <input type="number" id="petIdade" placeholder="Opcional" min="0">
                    </div>
                </div>

                <div class="linha-dupla">
                    <div>
                        <label for="petPeso">Peso (kg)</label>
                        <input type="number" id="petPeso" placeholder="Opcional" step="0.1">
                    </div>
                    <div>
                        <label for="petCor">Cor</label>
                        <input  type="text" id="petCor" placeholder="Opcional">
                    </div>
                </div>

                <div id="modal-botoes">
                    <button type="submit">Adiconar pet</button>
                    <button type="button" onclick="fecharModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

                alert('Perfil atualizado!');

        });

        function sair() {
            localStorage.removeItem('mas_token');

            document.getElementById('modal-overplay').style.display = '';
        }

        function fecharModal() {
            document.getElementById('modal-overplay').style.display = 'none';

        document.getElementById('modal-overplay').addEventListener('click', function(e) {
            if (e.target === this) fecharModal();
        });
